<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizDev Platform — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2d3148;
      --text: #e8eaf0; --muted: #6b7280; --accent: #5b7cf6;
      --red: #ef4444; --radius: 8px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 340px; }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    p { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    input { width: 100%; background: #22263a; border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 10px 14px; font-size: 14px; outline: none; transition: border-color 0.15s; }
    input:focus { border-color: var(--accent); }
    button { width: 100%; margin-top: 16px; background: var(--accent); color: white; border: none; border-radius: var(--radius); padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    button:hover { background: #4a68e0; }
    .error { color: var(--red); font-size: 12px; margin-top: 10px; display: none; }
    .brand { font-size: 11px; color: var(--muted); text-align: center; margin-top: 20px; letter-spacing: 0.08em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="card">
    <h1>BizDev Platform</h1>
    <p>OptimAI · Nudge Digital</p>
    <label>Access Code</label>
    <input type="password" id="secret" placeholder="Enter your access code" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Enter</button>
    <div class="error" id="err">Incorrect access code.</div>
    <div class="brand">For internal use only</div>
  </div>
  <script>
    function login() {
      const secret = document.getElementById('secret').value;
      // Set cookie and redirect
      document.cookie = `ds=${encodeURIComponent(secret)}; path=/; max-age=86400`;
      // Verify by calling a protected endpoint
      fetch('/api/overview', { headers: { 'x-dashboard-secret': secret } })
        .then(r => {
          if (r.ok) window.location.href = '/';
          else { document.getElementById('err').style.display = 'block'; }
        })
        .catch(() => { document.getElementById('err').style.display = 'block'; });
    }
  </script>
</body>
</html>
